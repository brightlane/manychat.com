name: "ManyChat Vulture 10K Builder"

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # Fires at 6:00 AM UTC

permissions:
  contents: write

jobs:
  vulture-sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. Build ManyChat Authority Pages
        run: python article-generator.py

      - name: 4. Conflict-Free Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Add .nojekyll to speed up the bot
          touch .nojekyll
          
          git add .
          git commit -m "Vulture Sync: ManyChat Authority Hub" || echo "No changes"
          
          git fetch origin main
          git rebase origin/main
          git push origin main || (git pull --rebase origin main && git push origin main)
