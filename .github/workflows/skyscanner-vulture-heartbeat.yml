name: Vulture-Heartbeat
on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
env:
  PAGE_LIMIT_PER_RUN: 833
  AFFILIATE_1: "https://manychat.partnerlinks.io/bbwxetk27f88-64kfxo"
  AFFILIATE_2: "https://manychat.partnerlinks.io/98hj6b3pr28k-4znb59"
  AFFILIATE_3: "https://manychat.partnerlinks.io/emwcbue22i01-ogcg6e"
  AFFILIATE_4: "https://manychat.partnerlinks.io/t8let4hhqtqg-wki14"
  AFFILIATE_5: "https://manychat.partnerlinks.io/nwkkk7vkps17"
jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node vulture-generator.js
      - run: node quality-check.js
      - run: node generate-sitemap.js || echo "OK"
      - run: |
          git config user.name "Vulture[bot]"
          git config user.email "vulture@palmo.kid"
          git add .
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Vulture: 833 ManyChat pages"
            git push
          fi
