name: SkyScanner Vulture-Heartbeat

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'   # hourly
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

  AFFILIATE_1: "https://manychat.partnerlinks.io/bbwxetk27f88-64kfxo"
  AFFILIATE_2: "https://manychat.partnerlinks.io/98hj6b3pr28k-4znb59"
  AFFILIATE_3: "https://manychat.partnerlinks.io/emwcbue22i01-ogcg6e"
  AFFILIATE_4: "https://manychat.partnerlinks.io/t8let4hhqtqg-wki14"
  AFFILIATE_5: "https://manychat.partnerlinks.io/nwkkk7vkps17"

  # ⚙️ CONTROLLED OUTPUT (DO NOT HARD FORCE 100 WITHOUT LIMITER IN CODE)
  PAGE_LIMIT_PER_RUN: 100

jobs:
  vulture-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Generator
        run: |
          echo "🚀 Running generator with limit: $PAGE_LIMIT_PER_RUN"
          node generate.js
          node vulture-generator.js
          node generate-sitemap.js

      - name: Commit only if changes exist
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .

          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Hourly generation batch"
            git push
          fi
