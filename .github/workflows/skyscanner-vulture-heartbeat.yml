name: Vulture-Heartbeat

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *"  # Runs hourly
  workflow_dispatch:

env:
  PAGE_LIMIT_PER_RUN: 100

  # ManyChat affiliate URLs kept exactly as provided
  AFFILIATE_1: "https://manychat.partnerlinks.io/bbwxetk27f88-64kfxo"
  AFFILIATE_2: "https://manychat.partnerlinks.io/98hj6b3pr28k-4znb59"
  AFFILIATE_3: "https://manychat.partnerlinks.io/emwcbue22i01-ogcg6e"
  AFFILIATE_4: "https://manychat.partnerlinks.io/t8let4hhqtqg-wki14"
  AFFILIATE_5: "https://manychat.partnerlinks.io/nwkkk7vkps17"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Vulture Generator (up to ${{ env.PAGE_LIMIT_PER_RUN }} pages)
        run: node vulture-generator.js

      - name: Build Sitemap
        run: node generate-sitemap.js || echo "No sitemap changes needed"

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected"
          else
            git commit -m "Vulture-Heartbeat: Auto-generated pages & sitemap (ManyChat affiliates)"
            git push
          fi
